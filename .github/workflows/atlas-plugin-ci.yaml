name: d2e-atlas build plugin

on:
  workflow_dispatch:
    inputs:
      GIT_REPO_FULL_NAME:
        description: Select RepoName
        required: false
        type: choice
        options:
          - data2evidence/d2e-atlas
      GIT_BRANCH_NAME:
        default: develop
        description: Enter BranchName / ReleaseTagName
        required: true
        type: string
      tag:
        description: Enter tag for release
        required: true
        type: string
      release:
        description: Enter name for github release
        required: true
        type: string
      prerelease:
        type: boolean
        default: true
        required: true
      overwrite:
        type: boolean
        default: false
        required: true
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  push:
    branches:
      - develop

env:
  GIT_BRANCH_NAME: ${{ github.event.inputs.GIT_BRANCH_NAME || github.head_ref || github.ref_name }} # workflow_dispatch || pull_request || push
  GIT_REPO_FULL_NAME: ${{ github.event.inputs.GIT_REPO_FULL_NAME || github.event.pull_request.head.repo.full_name || github.event.repository.full_name }} # workflow_dispatch || pull_request || push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_BRANCH_NAME }}
          repository: ${{ env.GIT_REPO_FULL_NAME }}
          submodules: recursive
      - uses: dorny/paths-filter@v3.0.2
        id: file_changes
        with:
          initial-fetch-depth: 1
          filters: |
            js:
              - "js/**"
      - name: Use Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          registry-url: "https://pkgs.dev.azure.com/data2evidence/d2e/_packaging/d2e/npm/registry/"
          scope: "@data2evidence"
      - name: Install dependencies
        run: npm install
      - name: Patch package
        run: jq '.private=false' package.json > tmppkg; mv tmppkg package.json
      - name: Update Version
        run: |
          if [[ $GITHUB_EVENT_NAME == 'workflow_dispatch' ]]; then
            RELEASE_VERSION=${{ github.event.inputs.tag }}
            jq --arg v $RELEASE_VERSION '.version=$v' package.json > tmppkg; mv tmppkg package.json
          else
            jq --arg v "-$(date +%s)-$GITHUB_SHA" '.version+=$v' package.json > tmppkg; mv tmppkg package.json
          fi
      - name: Create Package with Node Modules
        run: |
          mkdir -p package
          rsync -av --exclude=node_modules --exclude=package ./ package/
          cp -r node_modules package/
          tar -czvf d2e-atlas-package.tgz -C package .
      - name: Publish Package 
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # SHOULD_PUBLISH: ${{ github.ref_name == 'master' || github.event_name == 'workflow_dispatch' }}
          SHOULD_PUBLISH: true
        run: |
          if [[ $SHOULD_PUBLISH == true ]]; then
            npm publish d2e-atlas-package.tgz
          else 
            npm publish --dry-run
          fi