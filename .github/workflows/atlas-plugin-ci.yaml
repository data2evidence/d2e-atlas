name: d2e-atlas build plugin

on:
  workflow_dispatch:
    inputs:
      GIT_REPO_FULL_NAME:
        description: Select RepoName
        required: false
        type: choice
        options:
          - data2evidence/d2e-atlas
      GIT_BRANCH_NAME:
        default: develop
        description: Enter BranchName / ReleaseTagName
        required: true
        type: string
      tag:
        description: Enter tag for release
        required: true
        type: string
      release:
        description: Enter name for github release
        required: true
        type: string
      prerelease:
        type: boolean
        default: true
        required: true
      overwrite:
        type: boolean
        default: false
        required: true
      artifacttype:
        type: choice
        required: true
        default: "OSS"
        options:
          - "OSS"
          - "Project"
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  push:
    branches:
      - develop

env:
  GIT_BRANCH_NAME: ${{ github.event.inputs.GIT_BRANCH_NAME || github.head_ref || github.ref_name }} # workflow_dispatch || pull_request || push
  GIT_REPO_FULL_NAME: ${{ github.event.inputs.GIT_REPO_FULL_NAME || github.event.pull_request.head.repo.full_name || github.event.repository.full_name }} # workflow_dispatch || pull_request || push
  NPM_ARTIFACT_TYPE: ${{ github.event.inputs.artifacttype || 'OSS'}}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_BRANCH_NAME }}
          repository: ${{ env.GIT_REPO_FULL_NAME }}
          submodules: recursive
      - uses: dorny/paths-filter@v3.0.2
        id: file_changes
        with:
          initial-fetch-depth: 1
          filters: |
            js:
              - "js/**"
      - name: Use Node.js - OSS
        uses: actions/setup-node@v4
        if: env.NPM_ARTIFACT_TYPE == 'OSS'
        with:
          node-version: "18.x"
          registry-url: "https://pkgs.dev.azure.com/data2evidence/d2e/_packaging/d2e/npm/registry/"
          scope: "@data2evidence"
      - name: Use Node.js - Project
        uses: actions/setup-node@v4
        if: env.NPM_ARTIFACT_TYPE == 'Project'
        with:
          node-version: "18.x"
          registry-url: "https://pkgs.dev.azure.com/data2evidence/d2e/_packaging/ms/npm/registry/"
          scope: "@data2evidence"
      - name: Install dependencies
        run: npm install
      - name: Patch package
        run: jq '.private=false' package.json > tmppkg; mv tmppkg package.json
      - name: Update Version
        run: |
          if [[ $GITHUB_EVENT_NAME == 'workflow_dispatch' ]]; then
            RELEASE_VERSION=${{ github.event.inputs.tag }}
            jq --arg v $RELEASE_VERSION '.version=$v' package.json > tmppkg; mv tmppkg package.json
          else
            jq --arg v "-$(date +%s)-$GITHUB_SHA" '.version+=$v' package.json > tmppkg; mv tmppkg package.json
          fi
      - name: Prepare NPM_TOKEN env
        run: |
          if [[ ${{ env.NPM_ARTIFACT_TYPE }} == 'Project' ]]; then
            echo "NPM_TOKEN=${NODE_PROJECT_AUTH_TOKEN}" >> $GITHUB_ENV
          else
            echo "NPM_TOKEN=${NODE_OSS_AUTH_TOKEN}" >> $GITHUB_ENV
          fi
        env:
          NODE_OSS_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_PROJECT_AUTH_TOKEN: ${{ secrets.NPM_PROJECT_TOKEN }}
      - name: Publish
        if: ${{ github.ref_name == 'master' || github.event_name == 'workflow_dispatch' || steps.file_changes.outputs.js == 'true' }}
        env:
          CI: false
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
          SHOULD_PUBLISH: ${{ github.ref_name == 'master' || github.event_name == 'workflow_dispatch' }}
        run: |
          if [[ $SHOULD_PUBLISH == true ]]; then
            npm publish
          else 
            npm publish --dry-run
          fi